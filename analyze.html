<!DOCTYPE html>
<html>
<head>
    <title>Sprite Analyzer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .result { margin-top: 20px; font-family: monospace; white-space: pre; background: #eee; padding: 10px; }
        canvas { border: 1px solid red; display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Sprite Analyzer</h1>
    <div id="status">Loading...</div>
    <div id="results"></div>

    <script>
        const files = [
            "阿弥陀如来っち.jpg", "阿弥陀如来っち（病気）.jpg",
            "十一面観音っち.jpg", "十一面観音っち（病気）.jpg",
            "弥勒菩薩っち.jpg", "弥勒菩薩っち（病気）.jpg",
            "建御雷神っち.jpg", "建御雷神っち（病気）.jpg"
        ];

        async function analyze(file) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const data = ctx.getImageData(0, 0, img.width, img.height).data;

                    // Detect background (top-left pixel)
                    const bgR = data[0], bgG = data[1], bgB = data[2];

                    const frames = 3;
                    const bandW = Math.floor(img.width / frames);
                    const h = img.height;
                    const frameResults = [];

                    for (let i = 0; i < frames; i++) {
                        const left = i * bandW;
                        const right = (i === frames - 1) ? img.width : (i + 1) * bandW;

                        let minX = right, minY = h, maxX = left, maxY = 0;
                        let found = false;

                        for (let y = 0; y < h; y++) {
                            for (let x = left; x < right; x++) {
                                const idx = (y * img.width + x) * 4;
                                const r = data[idx], g = data[idx+1], b = data[idx+2];

                                // Distance check
                                const dist = Math.abs(r - bgR) + Math.abs(g - bgG) + Math.abs(b - bgB);
                                if (dist > 40) {
                                    found = true;
                                    if (x < minX) minX = x;
                                    if (x > maxX) maxX = x;
                                    if (y < minY) minY = y;
                                    if (y > maxY) maxY = y;
                                }
                            }
                        }

                        if (found) {
                            frameResults.push({
                                frame: i,
                                sx: minX - 2,
                                sy: minY - 2,
                                sWidth: (maxX - minX) + 4,
                                sHeight: (maxY - minY) + 4
                            });
                        } else {
                            frameResults.push({ frame: i, error: "not found" });
                        }
                    }
                    
                    // Display results
                    const div = document.createElement('div');
                    div.innerHTML = `<h3>${file} (${img.width}x${img.height})</h3>` +
                                    `<pre>${JSON.stringify(frameResults, null, 2)}</pre>`;
                    document.getElementById('results').appendChild(div);
                    resolve();
                };
                img.onerror = () => {
                    const div = document.createElement('div');
                    div.innerHTML = `<h3>${file} - FAILED TO LOAD</h3>`;
                    document.getElementById('results').appendChild(div);
                    resolve();
                };
                img.src = file;
            });
        }

        async function run() {
            for (const f of files) {
                document.getElementById('status').textContent = `Analyzing ${f}...`;
                await analyze(f);
            }
            document.getElementById('status').textContent = "Done!";
        }

        run();
    </script>
</body>
</html>
